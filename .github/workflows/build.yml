name: Build Fedora for Raphael

on:
  workflow_dispatch:
    inputs:
      system_types:
        description: 'Types (comma-sep: fedora-gnome,fedora-kde,fedora-niri)'
        required: false
        default: 'fedora-gnome,fedora-kde,fedora-niri'
      kernel_version:
        required: false
        default: '7.1'
      fedora_version:
        required: false
        default: '42'
      kernel_repo:
        description: 'Kernel repository (owner/repo)'
        required: false
        default: 'GengWei1997/kernel-deb'
  push:
    branches: [main]
    paths: ['scripts/**', 'build.sh', 'build-config.sh']

permissions:
  contents: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          TYPES="${{ github.event.inputs.system_types || 'fedora-gnome,fedora-kde,fedora-niri' }}"
          KV="${{ github.event.inputs.kernel_version || '7.1' }}"
          FV="${{ github.event.inputs.fedora_version || '42' }}"
          KR="${{ github.event.inputs.kernel_repo || 'GengWei1997/kernel-deb' }}"
          M="["; F=true
          IFS=',' read -ra S <<< "$TYPES"
          for s in "${S[@]}"; do
            [ "$F" = true ] && F=false || M="$M,"
            M="$M{\"type\":\"$s\",\"kernel\":\"$KV\",\"fedora\":\"$FV\",\"repo\":\"$KR\"}"
          done
          M="$M]"
          echo "matrix=$M" >> $GITHUB_OUTPUT

  build:
    needs: matrix
    runs-on: ubuntu-24.04-arm
    container:
      image: fedora:${{ matrix.fedora }}
      options: --privileged
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.matrix) }}
    env:
      SYSTEM_TYPE: ${{ matrix.type }}
      KERNEL_VERSION: ${{ matrix.kernel }}
      FEDORA_VERSION: ${{ matrix.fedora }}
      KERNEL_REPO: ${{ matrix.repo }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          dnf install -y coreutils findutils util-linux e2fsprogs rsync gawk curl zstd
          dnf install -y --allowerasing dpkg 2>/dev/null || true

      - name: Download kernel
        run: |
          mkdir -p xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}
          curl -sL -o xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/linux-image-xiaomi-raphael.deb \
            "https://github.com/${{ env.KERNEL_REPO }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/linux-image-xiaomi-raphael.deb"
          curl -sL -o xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/linux-headers-xiaomi-raphael.deb \
            "https://github.com/${{ env.KERNEL_REPO }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/linux-headers-xiaomi-raphael.deb"
          curl -sL -o xiaomi-raphael-debs_${{ env.KERNEL_VERSION }}/firmware-xiaomi-raphael.deb \
            "https://github.com/${{ env.KERNEL_REPO }}/releases/download/kernel-v${{ env.KERNEL_VERSION }}/firmware-xiaomi-raphael.deb"
          curl -sL -o xiaomi-k20pro-boot.img \
            "https://github.com/GengWei1997/kernel-deb/releases/download/v1.0.0/xiaomi-k20pro-boot.img"

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh "${{ env.SYSTEM_TYPE }}" "${{ env.KERNEL_VERSION }}"

      - name: Package
        run: |
          D=$(date +'%Y%m%d')
          F="rootfs-${{ env.SYSTEM_TYPE }}-k${{ env.KERNEL_VERSION }}-f${{ env.FEDORA_VERSION }}-$D"
          sha256sum rootfs.img > ${F}.sha256
          zstd -T0 -v rootfs.img -o "${F}.img.zst"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.type }}-${{ matrix.kernel }}
          path: "*.img.zst *.sha256"
          retention-days: 7

      - if: always()
        run: rm -rf rootdir xiaomi-raphael-debs_* xiaomi-k20pro-boot.img rootfs.img 2>/dev/null || true
